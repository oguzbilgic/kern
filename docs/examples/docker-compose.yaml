# Example Docker Compose for kern agents
#
# Usage:
#   1. Build the kern base image:
#        cd <kern-ai-repo>
#        docker build -t kern-ai .
#
#   2. Build your agent image (bakes in initial state):
#        docker build -f Dockerfile.agent -t my-agent \
#          --build-arg AGENT_DIR=./my-agent .
#
#   3. Create a .env file with your secrets:
#        ANTHROPIC_API_KEY=sk-ant-...
#        SLACK_BOT_TOKEN=xoxb-...
#        SLACK_APP_TOKEN=xapp-...
#
#   4. Run:
#        docker compose up -d

services:
  # Single agent example
  my-agent:
    image: my-agent
    container_name: kern-my-agent
    volumes:
      - my-agent-data:/agent
    environment:
      - KERN_PORT=8080
      - KERN_HOST=0.0.0.0
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Second agent example (uncomment to use)
  #
  # another-agent:
  #   image: another-agent
  #   container_name: kern-another-agent
  #   volumes:
  #     - another-agent-data:/agent
  #   environment:
  #     - KERN_PORT=8080
  #     - KERN_HOST=0.0.0.0
  #   env_file:
  #     - .env.another
  #   ports:
  #     - "8081:8080"
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 10s

volumes:
  my-agent-data:
  # another-agent-data:
