# Example Docker Compose for kern agents
#
# Usage:
#   1. Build the kern base image:
#        cd <kern-ai-repo>
#        docker build -t kern-ai .
#
#   2. Build your agent image (bakes in initial state):
#        docker build -f Dockerfile.agent -t my-agent \
#          --build-arg AGENT_DIR=./my-agent .
#
#   3. Run:
#        docker compose up -d
#
# Secrets are read from each agent's .kern/.env file (created by kern init).
# No need to copy or duplicate secret files.

services:
  # Single agent example
  my-agent:
    image: my-agent
    container_name: kern-my-agent
    volumes:
      - my-agent-data:/agent
    environment:
      - KERN_PORT=8080
      - KERN_HOST=0.0.0.0
      # - GIT_REMOTE_URL=https://x-access-token:ghp_xxx@github.com/org/my-agent-state.git
    env_file:
      - ./my-agent/.kern/.env
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Second agent example (uncomment to use)
  #
  # another-agent:
  #   image: another-agent
  #   container_name: kern-another-agent
  #   volumes:
  #     - another-agent-data:/agent
  #   environment:
  #     - KERN_PORT=8080
  #     - KERN_HOST=0.0.0.0
  #     - GIT_REMOTE_URL=https://x-access-token:ghp_xxx@github.com/org/another-agent-state.git
  #   env_file:
  #     - ./another-agent/.kern/.env
  #   ports:
  #     - "8081:8080"
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 30s

volumes:
  my-agent-data:
  # another-agent-data:
