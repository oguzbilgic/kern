<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<title>kern</title>
<style>
  :root {
    --bg: #1a1a1a;
    --bg-surface: #252525;
    --bg-sidebar: #141414;
    --bg-input: #1a1a1a;
    --border: #2a2a2a;
    --text: #EDEDED;
    --text-dim: #A0A0A0;
    --text-muted: #707070;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --green: #12c905;
    --red: #fc533a;
    --orange: #fcd53a;
    --tool-bg: #1e1e1e;
    --user-bg: #0d419d;
    --magenta: #bc8cff;
    --yellow: #d29922;
    --cyan: #56d4dd;
    --tool-bash: #f85149;
    --tool-read: #56d4dd;
    --tool-write: #3fb950;
    --tool-edit: #d29922;
    --tool-glob: #bc8cff;
    --tool-grep: #58a6ff;
    --tool-webfetch: #56d4dd;
    --tool-kern: #e6edf3;
    --tool-message: #3fb950;
    --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: row;
    overflow: hidden;
  }

  /* --- Sidebar --- */
  .sidebar {
    width: 200px;
    flex-shrink: 0;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }
  .sidebar-header {
    padding: 0 14px;
    height: 42px;
    min-height: 42px;
    font-weight: 600;
    font-size: 15px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }

  /* Add agent modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: min(360px, 90vw);
  }
  .modal-title {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 14px;
  }
  .modal input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    font-family: var(--font-sans);
    margin-bottom: 8px;
    outline: none;
    box-sizing: border-box;
  }
  .modal input:focus { border-color: var(--text-muted); }
  .modal input::placeholder { color: var(--text-muted); }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    justify-content: flex-end;
  }
  .modal-actions button {
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
  }
  .modal-actions .btn-add {
    background: #333;
    color: var(--text);
  }
  .modal-actions .btn-add:hover { background: #444; }
  .modal-actions .btn-cancel {
    background: transparent;
    color: var(--text-dim);
  }
  .modal-actions .btn-cancel:hover { color: var(--text); }

  .switcher-add-inline {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 2px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .switcher-add-inline:hover { background: rgba(255,255,255,0.05); color: var(--text-dim); }
  .switcher-add-inline span {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
    border: 1px dashed var(--border);
    flex-shrink: 0;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
    position: relative;
  }

  .sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; border-right: none; }

  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
  }

  /* Mobile: sidebar floats over content */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 101;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      width: 200px;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar.collapsed { transform: translateX(-100%); }
    .sidebar-backdrop.open { display: block; }
  }

  /* --- Header --- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
    height: 42px;
    min-height: 42px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-title {
    font-weight: 600;
    font-size: 15px;
  }
  .header-meta {
    font-size: 12px;
    color: var(--text-dim);
  }
  .info-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    line-height: 1;
    letter-spacing: 1px;
  }
  .info-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }

  /* --- Agent info panel --- */
  .info-panel {
    display: none;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    font-size: 12px;
    font-family: var(--font-mono);
    line-height: 1.8;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .info-panel.open { display: block; }
  .info-panel .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .info-panel .info-label { color: var(--text-muted); }
  .info-panel .info-value { color: var(--text); }
  .info-panel .info-section {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .info-panel .info-copy {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 2px 8px;
    cursor: pointer;
    margin-left: 8px;
  }
  .info-panel .info-copy:hover { color: var(--text); border-color: var(--text-muted); }
  .info-panel .info-url {
    font-size: 11px;
    color: var(--text-dim);
    word-break: break-all;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-dot.connected { background: var(--accent); }
  .status-dot.disconnected { background: var(--red); }
  .status-dot.connecting { background: var(--orange); }

  /* --- Filter dropdown --- */
  .filter-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    line-height: 1;
  }
  .filter-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .filter-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 0;
    z-index: 50;
    min-width: 160px;
  }
  .filter-dropdown.open { display: block; }
  .filter-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-dim);
  }
  .filter-item:hover { background: rgba(255,255,255,0.05); }
  .filter-item .check {
    width: 16px;
    height: 16px;
    border: 1px solid var(--border);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .filter-item.active .check { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Filter hide rules — hides entire turn (trigger + response + tools) */
  .messages.hide-heartbeat .from-heartbeat { display: none; }
  .messages.hide-heartbeat .timestamp.from-heartbeat { display: none; }
  .messages.hide-tools .message.tool { display: none; }
  .messages.hide-tools .message.recall { display: none; }
  .messages.hide-incoming .from-incoming { display: none; }
  .messages.hide-incoming .timestamp.from-incoming { display: none; }
  .messages.hide-system .message.system { display: none; }
  .messages.hide-tui .from-tui { display: none; }
  .messages.hide-tui .timestamp.from-tui { display: none; }

  /* --- Messages --- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .message {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 8px;
    word-wrap: break-word;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.6;
  }
  .message a { color: var(--accent); }
  .message code {
    font-family: var(--font-mono);
    font-size: 13px;
    background: rgba(110,118,129,0.15);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .message pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 6px 0;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.5;
  }
  .message pre code {
    background: none;
    padding: 0;
  }

  .message.user {
    align-self: flex-end;
    background: var(--bg-surface);
    color: #d4d4d4;
    border-right: 3px solid var(--accent);
    border-radius: 8px 0 0 8px;
  }
  .message.user-remote {
    align-self: flex-end;
    background: var(--bg-surface);
    color: #d4d4d4;
    border-right: 3px solid var(--orange);
    border-radius: 8px 0 0 8px;
    opacity: 0.85;
  }
  .message.user-remote .label {
    font-size: 11px;
    color: var(--orange);
    display: block;
    margin-bottom: 2px;
  }
  .message.assistant {
    align-self: flex-start;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px 8px 8px 2px;
    color: #d4d4d4;
  }
  .timestamp {
    font-size: 10px;
    color: var(--text-muted);
    padding: 2px 4px;
  }
  .ts-right { align-self: flex-end; }
  .ts-left { align-self: flex-start; }
  .message.assistant.muted {
    color: var(--text-muted);
    font-style: italic;
    border-color: transparent;
    background: transparent;
  }
  .message.tool {
    align-self: flex-start;
    background: var(--tool-bg);
    border-left: 3px solid var(--text-muted);
    border-radius: 0;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    padding: 4px 10px;
    max-width: 90%;
  }
  .message.tool { cursor: pointer; }
  .message.tool .tool-header { display: flex; align-items: center; gap: 6px; }
  .message.tool .tool-arrow { font-size: 10px; color: var(--text-muted); transition: transform 0.15s; }
  .message.tool.expanded .tool-arrow { transform: rotate(90deg); }
  .message.tool .tool-name { font-weight: 600; }
  .message.tool .tool-detail { color: var(--text-muted); }
  .message.tool .tool-output {
    display: none;
    margin-top: 6px;
    padding: 8px;
    background: var(--bg);
    border-radius: 4px;
    font-size: 11px;
    line-height: 1.4;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-dim);
  }
  .message.tool.expanded .tool-output { display: block; }
  .message.tool .diff-line-old { color: var(--red); }
  .message.tool .diff-line-new { color: var(--green); }
  .message.recall {
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 12px;
    cursor: pointer;
  }
  .message.recall .recall-header { display: flex; align-items: center; gap: 6px; }
  .message.recall .recall-summary { font-weight: 500; }
  .message.recall .recall-details {
    display: none;
    margin-top: 8px;
    padding: 8px;
    background: var(--bg-secondary);
    border-radius: 6px;
    font-size: 12px;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
  }
  .message.recall.expanded .recall-details { display: block; }
  .message.recall.expanded .tool-arrow { transform: rotate(90deg); }
  .message.recall .recall-chunk { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .message.recall .recall-chunk:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .message.recall .recall-time { color: var(--text-muted); font-size: 11px; }
  .message.error {
    align-self: flex-start;
    background: rgba(248,81,73,0.1);
    border: 1px solid var(--red);
    color: var(--red);
  }
  .message.incoming {
    align-self: flex-end;
    background: var(--bg-surface);
    border-right: 3px solid var(--yellow);
    border-radius: 8px 0 0 8px;
    color: var(--text-dim);
    font-size: 14px;
    padding: 8px 12px;
  }
  .message.incoming .label {
    font-size: 11px;
    color: var(--yellow);
    display: block;
    margin-bottom: 2px;
    text-align: right;
  }
  .message.outgoing {
    align-self: flex-start;
    background: var(--bg-surface);
    border-left: 3px solid var(--green);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: var(--text-dim);
    padding: 6px 12px;
  }
  .message.outgoing .label {
    font-size: 11px;
    color: var(--green);
    display: block;
    margin-bottom: 2px;
  }
  .message.heartbeat {
    align-self: flex-end;
    background: var(--bg-surface);
    border-right: 3px solid var(--magenta);
    border-radius: 8px 0 0 8px;
    color: var(--text-muted);
    font-size: 12px;
    padding: 4px 10px;
    text-align: right;
  }
  .message.command-result {
    align-self: flex-start;
    background: var(--bg-surface);
    border-left: 3px solid var(--green);
    border-radius: 0;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    padding: 8px 12px;
    white-space: pre-wrap;
    max-width: 90%;
  }
  .message.system {
    align-self: center;
    font-size: 12px;
    color: var(--text-muted);
    padding: 2px 8px;
  }

  /* --- Markdown --- */
  .message h1, .message h2, .message h3, .message h4, .message h5, .message h6 {
    margin: 8px 0 4px 0;
    line-height: 1.3;
    color: var(--text);
  }
  .message h1 { font-size: 18px; }
  .message h2 { font-size: 16px; }
  .message h3 { font-size: 14px; }
  .message h4, .message h5, .message h6 { font-size: 13px; }
  .message ul, .message ol {
    margin: 4px 0;
    padding-left: 20px;
  }
  .message li { margin: 2px 0; }
  .message blockquote {
    border-left: 3px solid var(--border);
    margin: 4px 0;
    padding: 2px 10px;
    color: var(--text-dim);
  }
  .message hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 8px 0;
  }
  .message table {
    border-collapse: collapse;
    margin: 6px 0;
    font-size: 12px;
  }
  .message th, .message td {
    border: 1px solid var(--border);
    padding: 4px 8px;
    text-align: left;
  }
  .message th {
    background: var(--bg);
    color: var(--text);
    font-weight: 600;
  }
  .message pre {
    background: var(--bg);
    border-radius: 6px;
    padding: 10px 12px;
    margin: 6px 0;
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.5;
  }
  .message code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--bg);
    padding: 1px 4px;
    border-radius: 3px;
  }
  .message pre code {
    background: none;
    padding: 0;
  }
  .message a {
    color: var(--accent);
    text-decoration: none;
  }
  .message a:hover { text-decoration: underline; }
  .message strong { color: var(--text); }

  .streaming-cursor::after {
    content: '▊';
    animation: blink 0.8s infinite;
    color: var(--accent);
  }
  @keyframes blink { 50% { opacity: 0; } }

  .thinking {
    align-self: flex-start;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .thinking .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.4s ease-in-out infinite;
  }
  .thinking .dot:nth-child(1) { animation-delay: 0s; }
  .thinking .dot:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* --- Input --- */
  .scroll-down-btn {
    display: none;
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    transition: opacity 0.15s;
    opacity: 0.85;
  }
  .scroll-down-btn:hover { opacity: 1; background: var(--bg-hover); border-color: var(--text-muted); }
  .scroll-down-btn.visible { display: flex; }
  .input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    position: relative;
  }
  .input-row textarea {
    flex: 1;
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    outline: none;
    max-height: 40vh;
    min-height: 44px;
    overflow-y: hidden;
  }
  .input-row textarea:focus {
    border-color: var(--text-muted);
  }
  .input-row textarea::placeholder {
    color: var(--text-muted);
  }
  .input-row button {
    background: var(--bg-surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 12px;
    font-size: 18px;
    cursor: pointer;
    min-height: 44px;
    flex-shrink: 0;
    line-height: 1;
  }
  .input-row button:not(:disabled) { background: #333; color: var(--text); }
  .input-row button:not(:disabled):hover { background: #3d3d3d; color: #fff; }
  .input-row button:not(:disabled):active { background: #444; color: #fff; }
  /* --- Command autocomplete --- */
  .cmd-popup {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 0;
    right: 0;
    margin-bottom: 4px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    z-index: 50;
  }
  .cmd-popup.open { display: block; }
  .cmd-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 14px;
  }
  .cmd-item:hover, .cmd-item.selected {
    background: rgba(255,255,255,0.05);
  }
  .cmd-item-name {
    font-family: var(--font-mono);
    font-weight: 600;

<script>
// ==========================================================================
// Agent Client Protocol
// ==========================================================================
// Pure data layer — no DOM, no rendering. Portable to any client.

const AgentClient = {
  /**
   * Connect to agent SSE event stream.
   * @param {string} baseUrl - Agent HTTP base URL
   * @param {string} [token] - Auth token
   * @param {function} onEvent - Called with each ServerEvent
   * @param {function} onConnect - Called when stream connects
   * @param {function} onDisconnect - Called when stream disconnects
   * @returns {{ close: function }} - Call close() to disconnect
   */
  connect(baseUrl, token, { onEvent, onConnect, onDisconnect }) {
    // EventSource can't set headers — pass token as query param
    const url = token ? `${baseUrl}/events?token=${encodeURIComponent(token)}` : `${baseUrl}/events`;
    const es = new EventSource(url);
    let connected = false;
    es.onopen = () => { connected = true; onConnect?.(); };
    let connectionId = null;
    es.onmessage = (e) => {
      try {
        const ev = JSON.parse(e.data);
        if (ev.type === 'connection' && ev.connectionId) {
          connectionId = ev.connectionId;
          return; // don't pass connection event to handler
        }
        onEvent(ev);
      } catch {}
    };
    es.onerror = () => {
      es.close();
      if (connected) {
        connected = false;
        onDisconnect?.();
      } else {
        // Never connected — likely auth failure or server down
        onDisconnect?.();
      }
    };
    return {
      close() { es.close(); onDisconnect?.(); },
      get connectionId() { return connectionId; }
    };
  },

  /**
   * Build headers for authenticated requests.
   * @param {string} [token]
   * @returns {object}
   */
  _headers(token) {
    const h = { 'Content-Type': 'application/json' };
    if (token) h['Authorization'] = `Bearer ${token}`;
    return h;
  },

  /**
   * Send a message to the agent.
   * @param {string} baseUrl
   * @param {string} [token]
   * @param {string} text
   * @param {object} [opts] - userId, interface, channel
   * @returns {Promise<{ok: boolean}>}
   */
  async sendMessage(baseUrl, token, text, opts = {}) {
    const res = await fetch(`${baseUrl}/message`, {
      method: 'POST',
      headers: this._headers(token),
      body: JSON.stringify({
        text,
        userId: opts.userId || 'tui',
        interface: opts.interface || 'web',
        channel: opts.channel || 'web',
        connectionId: opts.connectionId,
      }),
    });
    return res.json();
  },

  /**
   * Get agent status.
   * @param {string} baseUrl
   * @param {string} [token]
   * @returns {Promise<object>}
   */
  async getStatus(baseUrl, token) {
    const res = await fetch(`${baseUrl}/status`, { headers: this._headers(token) });
    return res.json();
  },

  /**
   * Get message history.
   * @param {string} baseUrl
   * @param {string} [token]
   * @param {number} [limit=50]
   * @param {number} [before] - Index to paginate from
   * @returns {Promise<Array>}
   */
  async getHistory(baseUrl, token, limit = 50, before) {
    const params = new URLSearchParams({ limit: String(limit) });
    if (before !== undefined) params.set('before', String(before));
    const res = await fetch(`${baseUrl}/history?${params}`, { headers: this._headers(token) });
    return res.json();
  },
};

// ==========================================================================
// Markdown (minimal)
// ==========================================================================

// Parse user messages from history — strips [via ...] metadata prefix
function parseHistoryUserMessage(content) {
  const match = content.match(/^\[via ([^,]+),?\s*([^,]*),?\s*user:\s*([^,\]]*),?\s*(?:time:\s*([^\]]*))?\]\n?([\s\S]*)$/);
  if (match) {
    const [, iface, channel, userId, time, text] = match;
    const cleanText = (text || '').trim() || '(empty)';
    const timestamp = time ? time.trim() : null;
    // TUI and web messages are the operator
    if (iface.trim() === 'tui') return { type: 'user', text: cleanText, timestamp, iface: 'tui' };
    if (iface.trim() === 'web') return { type: 'user', text: cleanText, timestamp, iface: 'web' };
    // Heartbeat
    if (iface.trim() === 'system') return { type: 'heartbeat', text: '', iface: 'heartbeat' };
    // Other interfaces (telegram, slack)
    return { type: 'incoming', text: cleanText, meta: `[${iface.trim()} ${userId.trim()}]`, timestamp, iface: 'incoming' };
  }
  if (content === '[heartbeat]' || content.startsWith('[heartbeat')) return { type: 'heartbeat', text: '', iface: 'heartbeat' };
  return { type: 'user', text: content };
}

function renderMarkdown(text) {
  if (!text) return '';

  // Escape HTML
  let src = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Extract code blocks first to protect them
  const codeBlocks = [];
  src = src.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    // Keep HTML-escaped content inside code blocks — safe against injection
    codeBlocks.push(`<pre><code>${code}</code></pre>`);
    return `\x00CODEBLOCK${idx}\x00`;
  });

  // Process block elements line by line
  const lines = src.split('\n');
  const out = [];
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // Code block placeholder
    const cbMatch = line.match(/^\x00CODEBLOCK(\d+)\x00$/);
    if (cbMatch) { out.push(codeBlocks[parseInt(cbMatch[1])]); i++; continue; }

    // Headers
    const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (hMatch) { const lvl = hMatch[1].length; out.push(`<h${lvl}>${inline(hMatch[2])}</h${lvl}>`); i++; continue; }

    // Horizontal rule
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(line.trim())) { out.push('<hr>'); i++; continue; }

    // Blockquote (collect consecutive > lines)
    if (/^&gt;\s?/.test(line)) {
      const bqLines = [];
      while (i < lines.length && /^&gt;\s?/.test(lines[i])) {
        bqLines.push(lines[i].replace(/^&gt;\s?/, ''));
        i++;
      }
      out.push(`<blockquote>${renderMarkdown(bqLines.join('\n'))}</blockquote>`);
      continue;
    }

    // Unordered list (collect consecutive - or * lines)
    if (/^[\-\*]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^[\-\*]\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^[\-\*]\s+/, ''));
        i++;
      }
      out.push('<ul>' + items.map(li => `<li>${inline(li)}</li>`).join('') + '</ul>');
      continue;
    }

    // Ordered list (collect consecutive 1. 2. lines)
    if (/^\d+\.\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\d+\.\s+/, ''));
        i++;
      }
      out.push('<ol>' + items.map(li => `<li>${inline(li)}</li>`).join('') + '</ol>');
      continue;
    }

    // Table (| ... | rows)
    if (/^\|.+\|$/.test(line.trim())) {
      const rows = [];
      while (i < lines.length && /^\|.+\|$/.test(lines[i].trim())) {
        rows.push(lines[i]);
        i++;
      }
      if (rows.length >= 2) {
        const header = rows[0].split('|').filter(c => c.trim()).map(c => `<th>${inline(c.trim())}</th>`).join('');
        // Skip separator row (row 1)
        const body = rows.slice(2).map(r => {
          const cells = r.split('|').filter(c => c.trim()).map(c => `<td>${inline(c.trim())}</td>`).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
        out.push(`<table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`);
      } else {
        out.push(inline(line));
      }
      continue;
    }

    // Empty line
    if (line.trim() === '') { out.push(''); i++; continue; }

    // Plain paragraph
    out.push(inline(line));
    i++;
  }

  // Join with <br> for single newlines, collapse empty lines
  return out.join('<br>').replace(/(<br>){3,}/g, '<br><br>').replace(/<br>(<\/?(?:pre|ul|ol|li|blockquote|h[1-6]|hr|table|thead|tbody|tr|th|td))/g, '$1').replace(/(<\/(?:pre|ul|ol|li|blockquote|h[1-6]|hr|table|thead|tbody|tr|th|td)>)<br>/g, '$1');
}

function inline(text) {
  return text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
      // Only allow http/https links
      if (/^https?:\/\//i.test(url)) {
        return `<a href="${url}" target="_blank" rel="noopener">${label}</a>`;
      }
      return `${label} (${url})`;
    });
}

// ==========================================================================
// UI
// ==========================================================================

const $ = (id) => document.getElementById(id);
const messagesEl = $('messages');
const inputEl = $('input');
const sendBtn = $('send');
const statusDot = $('status-dot');
const agentNameEl = $('agent-name');
const infoPanel = $('info-panel');

// Toggle agent info panel
$('info-btn').addEventListener('click', async () => {
  if (infoPanel.classList.contains('open')) {
    infoPanel.classList.remove('open');
    return;
  }
  if (!BASE_URL) return;
  try {
    const res = await fetch(`${BASE_URL}/status`, { headers: AgentClient._headers(AUTH_TOKEN) });
    if (!res.ok) return;
    const status = await res.json();

    const connUrl = BASE_URL || '';
    const connString = AUTH_TOKEN ? `${connUrl}?token=${AUTH_TOKEN}` : connUrl;

    const esc = (s) => (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    infoPanel.innerHTML = `
      <div class="info-row"><span class="info-label">kern</span><span class="info-value">v${esc(status.version) || '?'}</span></div>
      <div class="info-row"><span class="info-label">model</span><span class="info-value">${esc(status.provider)}/${esc(status.model)}</span></div>
      <div class="info-row"><span class="info-label">tools</span><span class="info-value">${esc(status.toolScope)}</span></div>
      ${status.telegram ? `<div class="info-row"><span class="info-label">telegram</span><span class="info-value">${esc(status.telegram)}</span></div>` : ''}
      ${status.slack ? `<div class="info-row"><span class="info-label">slack</span><span class="info-value">${esc(status.slack)}</span></div>` : ''}
      ${status.recall ? `<div class="info-row"><span class="info-label">recall</span><span class="info-value">${esc(status.recall)}</span></div>` : ''}
      <div class="info-row"><span class="info-label">uptime</span><span class="info-value">${esc(status.uptime)}</span></div>
      <div class="info-row"><span class="info-label">session</span><span class="info-value">${esc(status.session)}</span></div>
      ${status.context ? `<div class="info-row"><span class="info-label">context</span><span class="info-value">${esc(status.context)}</span></div>` : ''}
      <div class="info-row"><span class="info-label">api usage</span><span class="info-value">${esc(status.apiUsage)}</span></div>
      <div class="info-row"><span class="info-label">queue</span><span class="info-value">${esc(status.queue)}</span></div>
      <div class="info-section">
        <div class="info-row">
          <span class="info-label">connection</span>
          <button class="info-copy" id="copy-conn">copy</button>
        </div>
        <div class="info-url">${esc(connString)}</div>
      </div>
    `;
    infoPanel.classList.add('open');

    $('copy-conn').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(connString);
        $('copy-conn').textContent = 'copied';
        setTimeout(() => { $('copy-conn').textContent = 'copy'; }, 1500);
      } catch {}
    });
  } catch {}
});

// ==========================================================================
// Agent Switcher
// ==========================================================================

// Servers — stored in localStorage as [{url, token}]
function getSavedServers() {
  try { return JSON.parse(localStorage.getItem('kern_servers') || '[]'); } catch { return []; }
}
function saveServers(servers) {
  localStorage.setItem('kern_servers', JSON.stringify(servers));
}
// Get token for a server URL (local or remote)
function getServerToken(serverUrl) {
  if (serverUrl === location.origin) {
    return localStorage.getItem('kern_web_token') || null;
  }
  const servers = getSavedServers();
  const entry = servers.find(s => s.url === serverUrl);
  return entry ? entry.token : null;
}
function setLocalToken(token) {
  localStorage.setItem('kern_web_token', token);
}
function getActiveAgent() {
  return sessionStorage.getItem('kern_active_agent') || null;
}
function setActiveAgent(name) {
  sessionStorage.setItem('kern_active_agent', name);
}

// All discovered agents grouped by server — fetched fresh each time
let allAgents = [];

let BASE_URL = null;
let AUTH_TOKEN = null;

// Avatar color from name hash
const AVATAR_COLORS = ['#e06c75','#e5c07b','#98c379','#56b6c2','#61afef','#c678dd','#be5046','#d19a66'];
function avatarColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}

// Render switcher panel — grouped by server
function renderSwitcher() {
  const list = $('switcher-list');
  const agents = getAllAgents();
  const activeName = getActiveAgent();
  list.innerHTML = '';
  if (agents.length === 0) {
    list.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:12px;">No agents found.</div>';
  } else {
    // Group by server
    const groups = new Map();
    for (const agent of agents) {
      const key = agent.server || location.origin;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(agent);
    }
    const remoteServers = getSavedServers();
    for (const [serverUrl, serverAgents] of groups) {
      const isLocal = serverUrl === location.origin;
      const isRemote = remoteServers.some(s => s.url === serverUrl);
      // Server header for remote servers
      if (!isLocal) {
        const header = document.createElement('div');
        header.className = 'switcher-server-header';
        let label;
        try { label = new URL(serverUrl).hostname; } catch { label = serverUrl; }
        header.innerHTML = `<span>${escapeHtml(label)}</span>`;
        if (isRemote) {
          const removeBtn = document.createElement('button');
          removeBtn.className = 'switcher-item-remove';
          removeBtn.title = 'Remove server';
          removeBtn.innerHTML = '&times;';
          removeBtn.style.display = 'inline';
          removeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            saveServers(remoteServers.filter(s => s.url !== serverUrl));
            allAgents = allAgents.filter(a => a.server !== serverUrl);
            renderSwitcher();
          });
          header.appendChild(removeBtn);
        }
        list.appendChild(header);
      }
      for (const agent of serverAgents) {
        const item = document.createElement('div');
        const classes = ['switcher-item'];
        if (agent.name === activeName) classes.push('active');
        if (!agent.running) classes.push('offline');
        item.className = classes.join(' ');
        const color = avatarColor(agent.name);
        const initial = agent.name.charAt(0).toUpperCase();
        const dotClass = agent.running ? 'running' : 'stopped';
        item.innerHTML = `
          <div class="switcher-item-avatar" style="background:${color}">
            ${initial}
            <span class="online-dot ${dotClass}"></span>
          </div>
          <div class="switcher-item-name">${agent.name}</div>
        `;
        if (agent.running && agent.url) {
          item.addEventListener('click', () => switchToAgent(agent));
        }
        list.appendChild(item);
      }
    }
  }
  // Add server row
  const addItem = document.createElement('div');
  addItem.className = 'switcher-add-inline';
  addItem.innerHTML = '<span>+</span> Add server';
  addItem.addEventListener('click', () => {
    $('add-modal').classList.add('open');
    $('add-url').focus();
  });
  list.appendChild(addItem);
}

function switchToAgent(agent) {
  setActiveAgent(agent.name);
  BASE_URL = agent.url;
  AUTH_TOKEN = getServerToken(agent.server || location.origin);
  authFailed = false;
  intentionalClose = true;
  if (connection) { connection.close(); connection = null; }
  messagesEl.innerHTML = '';
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.value = '';
  infoPanel.classList.remove('open');
  // On mobile, close sidebar. On desktop, keep it open and just update active state.
  if (window.innerWidth <= 768) closeSidebar();
  renderSwitcher();
  init();
  inputEl.focus();
}

function toggleSidebar() {
  const sidebar = $('sidebar');
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    const isOpen = sidebar.classList.contains('open');
    sidebar.classList.remove('collapsed');
    sidebar.classList.toggle('open', !isOpen);
    $('sidebar-backdrop').classList.toggle('open', !isOpen);
  } else {
    sidebar.classList.remove('open');
    const collapsed = sidebar.classList.toggle('collapsed');
    localStorage.setItem('kern_sidebar_collapsed', collapsed ? '1' : '');
  }
}
function openSidebar() {
  const sidebar = $('sidebar');
  sidebar.classList.remove('collapsed');
  sidebar.classList.add('open');
  $('sidebar-backdrop').classList.add('open');
}
function closeSidebar() {
  const sidebar = $('sidebar');
  sidebar.classList.remove('open');
  $('sidebar-backdrop').classList.remove('open');
  if (window.innerWidth > 768) {
    sidebar.classList.add('collapsed');
    localStorage.setItem('kern_sidebar_collapsed', '1');
  }
}

// Restore sidebar state on load
if (localStorage.getItem('kern_sidebar_collapsed') === '1' && window.innerWidth > 768) {
  $('sidebar').classList.add('collapsed');
}

// Fetch agents from a server URL, returns { agents, status }
async function fetchServerAgents(serverUrl) {
  try {
    const token = getServerToken(serverUrl);
    const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
    const res = await fetch(`${serverUrl}/api/agents`, { headers });
    if (res.status === 401) return { agents: [], status: 'unauthorized' };
    if (!res.ok) return { agents: [], status: 'error' };
    const data = await res.json();
    if (!Array.isArray(data)) return { agents: [], status: 'ok' };
    return {
      status: 'ok',
      agents: data.map(a => ({
        name: a.name,
        url: a.running ? `${serverUrl}/api/agents/${a.name}` : null,
        running: a.running,
        server: serverUrl,
      })),
    };
  } catch { return { agents: [], status: 'error' }; }
}

// Discover agents from local server + all saved remote servers
// Returns 'ok', 'unauthorized' (local server needs token), or 'error'
async function discoverAllAgents() {
  const localUrl = location.origin;
  const remoteUrls = getSavedServers().map(s => s.url);
  const allUrls = [localUrl, ...remoteUrls];
  const results = await Promise.all(allUrls.map(url => fetchServerAgents(url)));
  allAgents = results.flatMap(r => r.agents);
  // Return local server status
  return results[0].status;
}

// Get all agents (use cached results from last discover)
function getAllAgents() {
  return allAgents;
}

function setupSwitcher() {
  $('menu-btn').addEventListener('click', async () => {
    await discoverAllAgents();
    renderSwitcher();
    toggleSidebar();
  });
  $('sidebar-backdrop').addEventListener('click', () => {
    closeSidebar();
  });
  $('add-server-btn').addEventListener('click', async () => {
    const url = $('add-url').value.trim().replace(/\/$/, '');
    const token = $('add-token').value.trim() || null;
    if (!url) return;
    // Save token first so fetchServerAgents can use it
    const servers = getSavedServers();
    const existing = servers.findIndex(s => s.url === url);
    if (existing >= 0) {
      servers[existing] = { url, token };
    } else {
      servers.push({ url, token });
    }
    saveServers(servers);
    // Validate by fetching agents
    const result = await fetchServerAgents(url);
    if (result.agents.length === 0) {
      // Remove if validation failed
      saveServers(servers.filter(s => s.url !== url));
      $('add-url').style.borderColor = 'var(--red)';
      setTimeout(() => $('add-url').style.borderColor = '', 2000);
      return;
    }
    $('add-url').value = '';
    $('add-token').value = '';
    $('add-modal').classList.remove('open');
    await discoverAllAgents();
    renderSwitcher();
  });
  $('add-cancel-btn').addEventListener('click', () => {
    $('add-modal').classList.remove('open');
    $('add-url').value = '';
    $('add-token').value = '';
  });
  $('add-modal').addEventListener('click', (e) => {
    if (e.target === $('add-modal')) {
      $('add-modal').classList.remove('open');
      $('add-url').value = '';
      $('add-token').value = '';
    }
  });
}

let busy = false;
let streamingText = '';
let streamingEl = null;
let connection = null;
let authFailed = false;
let intentionalClose = false;
let currentTurnContext = null; // tracks which interface/type triggered the current turn
let lastToolEl = null; // last tool call element — kept expanded during streaming
let isLoadingHistory = false; // suppress auto-expand during history load

// --- Render helpers ---

let userScrolledUp = false;

const scrollDownBtn = $('scroll-down-btn');

messagesEl.addEventListener('scroll', () => {
  const threshold = 80;
  const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < threshold;
  userScrolledUp = !atBottom;
  scrollDownBtn.classList.toggle('visible', userScrolledUp);
});

scrollDownBtn.addEventListener('click', () => scrollToBottom(true));

function scrollToBottom(force) {
  if (force || !userScrolledUp) {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}

const TOOL_COLORS = {
  bash: 'var(--tool-bash)', read: 'var(--tool-read)', write: 'var(--tool-write)',
  edit: 'var(--tool-edit)', glob: 'var(--tool-glob)', grep: 'var(--tool-grep)',
  webfetch: 'var(--tool-webfetch)', kern: 'var(--tool-kern)', message: 'var(--tool-message)',
};

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatEditDiff(input) {
  if (!input || !input.oldString || !input.newString) return null;
  const oldLines = input.oldString.split('\n').map(l => `<span class="diff-line-old">- ${escapeHtml(l)}</span>`);
  const newLines = input.newString.split('\n').map(l => `<span class="diff-line-new">+ ${escapeHtml(l)}</span>`);
  return oldLines.join('\n') + '\n' + newLines.join('\n');
}

function formatTime(date) {
  if (!date) return null;
  const d = date instanceof Date ? date : new Date(date);
  if (isNaN(d)) return null;
  const now = new Date();
  const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  if (d.toDateString() === now.toDateString()) return time;
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + time;
}

function addMessage(type, content, meta, toolInput, timestamp, iface) {
  const el = document.createElement('div');
  el.className = `message ${type}`;
  // Set turn context on trigger messages
  if (type === 'user' || type === 'user-remote' || type === 'incoming' || type === 'heartbeat') {
    currentTurnContext = iface || type;
  }
  // Tag all messages with the current turn context
  if (iface) el.classList.add(`from-${iface}`);
  else if (currentTurnContext) el.classList.add(`from-${currentTurnContext}`);
  if (type === 'tool') {
    const spaceIdx = content.indexOf(' ');
    const toolName = spaceIdx > 0 ? content.slice(0, spaceIdx) : content;
    const toolDetail = spaceIdx > 0 ? content.slice(spaceIdx) : '';
    const color = TOOL_COLORS[toolName] || 'var(--text-dim)';
    el.style.borderLeftColor = color;
    el.innerHTML = `<div class="tool-header"><span class="tool-arrow">&#9654;</span><span class="tool-name" style="color:${color}">${toolName}</span><span class="tool-detail">${toolDetail}</span></div><div class="tool-output"></div>`;
    // Pre-fill tool output from input for specific tools
    if (toolName === 'edit' && toolInput) {
      const diff = formatEditDiff(toolInput);
      if (diff) {
        el.querySelector('.tool-output').innerHTML = diff;
      }
    } else if (toolName === 'write' && toolInput && toolInput.content) {
      el.querySelector('.tool-output').textContent = toolInput.content;
    } else if (toolName === 'message' && toolInput && toolInput.text) {
      el.querySelector('.tool-output').textContent = `→ ${toolInput.interface || 'unknown'}: ${toolInput.text}`;
    }
    el.addEventListener('click', () => el.classList.toggle('expanded'));
    // Auto-expand last tool call during streaming, collapse previous
    if (!isLoadingHistory) {
      if (lastToolEl) lastToolEl.classList.remove('expanded');
      el.classList.add('expanded');
      lastToolEl = el;
    }
  } else if (type === 'user-remote') {
    if (meta) {
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = meta;
      el.appendChild(label);
    }
    el.appendChild(document.createTextNode(content));
  } else if (type === 'incoming') {
    if (meta) {
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = meta;
      el.appendChild(label);
    }
    const text = document.createElement('span');
    text.innerHTML = renderMarkdown(content);
    el.appendChild(text);
  } else if (type === 'outgoing') {
    if (meta) {
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = meta;
      el.appendChild(label);
    }
    const text = document.createElement('span');
    text.innerHTML = renderMarkdown(content);
    el.appendChild(text);
  } else if (type === 'heartbeat') {
    el.textContent = content || '\u2661 heartbeat';
  } else if (type === 'command-result') {
    el.textContent = content;
  } else if (type === 'system') {
    el.textContent = content;
  } else {
    const isMuted = type === 'assistant' && (content.trim() === 'NO_REPLY' || content.trim() === '(no text response)');
    if (isMuted) el.classList.add('muted');
    el.innerHTML = renderMarkdown(content);
  }
  messagesEl.appendChild(el);
  if (timestamp && (type === 'user' || type === 'incoming' || type === 'outgoing')) {
    const ts = formatTime(timestamp);
    if (ts) {
      const tsEl = document.createElement('div');
      const side = (type === 'user' || type === 'incoming') ? 'ts-right' : 'ts-left';
      const ctx = currentTurnContext ? `from-${currentTurnContext}` : '';
      tsEl.className = `timestamp ${side} ${ctx}`;
      tsEl.textContent = ts;
      messagesEl.appendChild(tsEl);
    }
  }
  scrollToBottom();
  return el;
}

function flushStreaming() {
  if (streamingEl && streamingText) {
    streamingEl.classList.remove('streaming-cursor');
    const isMuted = streamingText.trim() === 'NO_REPLY' || streamingText.trim() === '(no text response)';
    if (isMuted) streamingEl.classList.add('muted');
    streamingEl.innerHTML = renderMarkdown(streamingText);
  }
  streamingText = '';
  streamingEl = null;
}

function setBusy(b) {
  busy = b;
  sendBtn.disabled = !inputEl.value.trim();
  if (!b) hideThinking();
}

function showThinking() {
  if ($('thinking')) return;
  const el = document.createElement('div');
  el.className = 'thinking';
  el.id = 'thinking';
  el.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  messagesEl.appendChild(el);
  scrollToBottom();
}

function hideThinking() {
  const el = $('thinking');
  if (el) el.remove();
}

function setConnected(state) {
  statusDot.className = `status-dot ${state}`;
}

// --- Event handling ---

function handleEvent(event) {
  switch (event.type) {
    case 'text-delta':
      hideThinking();
      if (!streamingEl) {
        if (lastToolEl) { lastToolEl.classList.remove('expanded'); lastToolEl = null; }
        streamingEl = addMessage('assistant', '');
        streamingEl.classList.add('streaming-cursor');
      }
      streamingText += event.text || '';
      streamingEl.innerHTML = renderMarkdown(streamingText);
      scrollToBottom();
      setBusy(true);
      break;

    case 'tool-call': {
      flushStreaming();
      hideThinking();
      const detail = event.toolDetail ? ` ${event.toolDetail}` : '';
      addMessage('tool', `${event.toolName}${detail}`, null, event.toolInput);
      setBusy(true);
      showThinking();
      break;
    }

    case 'tool-result': {
      // Find the last tool message and attach the result
      const toolMsgs = messagesEl.querySelectorAll('.message.tool');
      if (toolMsgs.length > 0) {
        const lastTool = toolMsgs[toolMsgs.length - 1];
        const outputEl = lastTool.querySelector('.tool-output');
        if (outputEl && event.toolResult) {
          const text = event.toolResult.length > 5000
            ? event.toolResult.slice(0, 5000) + '\n... (truncated)'
            : event.toolResult;
          if (outputEl.innerHTML) {
            outputEl.innerHTML += '\n\n' + escapeHtml(text);
          } else {
            outputEl.textContent = text;
          }
        }
      }
      scrollToBottom();
      // Agent is thinking about what to do next — show dots
      showThinking();
      break;
    }

    case 'recall': {
      hideThinking();
      const r = event.recall;
      if (r && r.chunks > 0) {
        const el = document.createElement('div');
        el.className = 'message recall';
        el.setAttribute('data-type', 'recall');
        const queryPreview = r.query ? r.query.replace(/\[via [^\]]+\]\s*/g, '').slice(0, 80) : '';
        const summary = `📎 ${r.chunks} memor${r.chunks === 1 ? 'y' : 'ies'} recalled (~${r.tokens} tokens)${queryPreview ? ` — "${escapeHtml(queryPreview)}"` : ''}`;
        const details = r.results.map(res => {
          const time = res.timestamp ? new Date(res.timestamp).toLocaleString() : '';
          const text = res.text.length > 300 ? res.text.slice(0, 300) + '...' : res.text;
          return `<div class="recall-chunk"><span class="recall-time">${escapeHtml(time)}</span>\n${escapeHtml(text)}</div>`;
        }).join('');
        el.innerHTML = `<div class="recall-header"><span class="tool-arrow">&#9654;</span><span class="recall-summary">${summary}</span></div><div class="recall-details">${details}</div>`;
        el.addEventListener('click', () => el.classList.toggle('expanded'));
        messagesEl.appendChild(el);
        scrollToBottom();
      }
      showThinking();
      break;
    }

    case 'finish':
      flushStreaming();
      hideThinking();
      setBusy(false);
      break;

    case 'error':
      flushStreaming();
      hideThinking();
      addMessage('error', event.error || 'Unknown error');
      setBusy(false);
      break;

    case 'incoming': {
      const isLocal = event.fromInterface === 'web' || event.fromInterface === 'tui';
      const source = event.fromInterface === 'tui' ? 'terminal' : event.fromInterface;
      const label = isLocal ? `via ${source}` : `${event.fromInterface} ${event.fromUserId || ''}`.trim();
      addMessage(isLocal ? 'user-remote' : 'incoming',
        event.text || '', label,
        null, new Date(), isLocal ? 'user-remote' : 'incoming');
      break;
    }

    case 'outgoing':
      addMessage('outgoing',
        event.text || '',
        `[→ ${event.fromInterface} ${event.fromUserId || ''}]`,
        null, new Date());
      break;

    case 'heartbeat':
      addMessage('heartbeat', '\u2661 heartbeat');
      break;

    case 'command-result':
      hideThinking();
      addMessage('command-result', event.text || '');
      setBusy(false);
      break;
  }
}

// --- Send ---

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage('user', text, null, null, new Date(), 'web');
  scrollToBottom(true);
  if (!busy) {
    setBusy(true);
    showThinking();
  }

  try {
    await AgentClient.sendMessage(BASE_URL, AUTH_TOKEN, text, { connectionId: connection?.connectionId });
  } catch (err) {
    addMessage('error', `Failed to send: ${err.message}`);
    if (!busy) setBusy(false);
  }
}

// --- Slash command autocomplete ---

const SLASH_COMMANDS = [
  { name: '/status', desc: 'agent status, uptime, token usage' },
  { name: '/restart', desc: 'restart the agent process' },
  { name: '/help', desc: 'list available commands' },
];

const cmdPopup = $('cmd-popup');
let cmdSelectedIdx = 0;
let cmdFiltered = [];

function updateCmdPopup() {
  const val = inputEl.value;
  // Show popup only when input starts with / and is a single word (no spaces)
  if (!val.startsWith('/') || val.includes(' ') || !val.trim()) {
    cmdPopup.classList.remove('open');
    cmdFiltered = [];
    return;
  }
  const query = val.toLowerCase();
  cmdFiltered = SLASH_COMMANDS.filter(c => c.name.startsWith(query));
  if (cmdFiltered.length === 0) {
    cmdPopup.classList.remove('open');
    return;
  }
  cmdSelectedIdx = Math.min(cmdSelectedIdx, cmdFiltered.length - 1);
  cmdPopup.innerHTML = cmdFiltered.map((c, i) =>
    `<div class="cmd-item${i === cmdSelectedIdx ? ' selected' : ''}" data-idx="${i}">` +
    `<span class="cmd-item-name">${c.name}</span>` +
    `<span class="cmd-item-desc">${c.desc}</span>` +
    `</div>`
  ).join('');
  cmdPopup.classList.add('open');
}

cmdPopup.addEventListener('click', (e) => {
  const item = e.target.closest('.cmd-item');
  if (!item) return;
  const idx = parseInt(item.dataset.idx);
  const cmd = cmdFiltered[idx];
  if (cmd) {
    inputEl.value = cmd.name;
    cmdPopup.classList.remove('open');
    send();
  }
});

// --- Input ---

inputEl.addEventListener('input', () => {
  // Auto-resize
  inputEl.style.height = 'auto';
  inputEl.style.height = inputEl.scrollHeight + 'px';
  inputEl.style.overflowY = inputEl.scrollHeight > inputEl.offsetHeight ? 'auto' : 'hidden';
  sendBtn.disabled = !inputEl.value.trim();
  updateCmdPopup();
});

inputEl.addEventListener('keydown', (e) => {
  // Arrow navigation in command popup
  if (cmdPopup.classList.contains('open')) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      cmdSelectedIdx = Math.min(cmdSelectedIdx + 1, cmdFiltered.length - 1);
      updateCmdPopup();
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      cmdSelectedIdx = Math.max(cmdSelectedIdx - 1, 0);
      updateCmdPopup();
      return;
    }
    if (e.key === 'Tab' || (e.key === 'Enter' && !e.shiftKey)) {
      e.preventDefault();
      const cmd = cmdFiltered[cmdSelectedIdx];
      if (cmd) {
        inputEl.value = cmd.name;
        cmdPopup.classList.remove('open');
        if (e.key === 'Enter') send();
      }
      return;
    }
    if (e.key === 'Escape') {
      cmdPopup.classList.remove('open');
      return;
    }
  }
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener('click', send);

// --- Connect ---

let reconnectTimer = null;

async function init() {
  // Cancel any pending reconnect
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  // Close existing connection
  intentionalClose = true;
  if (connection) { connection.close(); connection = null; }
  intentionalClose = false;
  // Clear previous messages to avoid duplicates on reconnect
  messagesEl.innerHTML = '';
  streamingText = '';
  streamingEl = null;
  lastToolEl = null;
  setConnected('connecting');

  // Load status — also serves as auth check
  try {
    const res = await fetch(`${BASE_URL}/status`, { headers: AgentClient._headers(AUTH_TOKEN) });
    if (res.status === 401) {
      authFailed = true;
      setConnected('disconnected');
      // Re-prompt for token
      await showTokenPrompt();
      AUTH_TOKEN = getServerToken(location.origin);
      authFailed = false;
      init();
      return;
    }
    const status = await res.json();
    const resolvedName = status.agentName || 'kern';
    agentNameEl.textContent = resolvedName;
    setActiveAgent(resolvedName);
  } catch {
    agentNameEl.textContent = 'kern';
  }

  // Load history
  try {
    const history = await AgentClient.getHistory(BASE_URL, AUTH_TOKEN, 100);
    isLoadingHistory = true;
    // Build tool result map: toolCallId → output string
    const toolResults = {};
    for (const msg of history) {
      if (msg.role === 'tool' && Array.isArray(msg.content)) {
        for (const part of msg.content) {
          if (part.type === 'tool-result' && part.toolCallId) {
            const output = part.output;
            toolResults[part.toolCallId] = typeof output === 'string' ? output
              : (output && output.value) ? String(output.value)
              : JSON.stringify(output);
          }
        }
      }
    }
    for (const msg of history) {
      if (msg.role === 'user' && typeof msg.content === 'string') {
        const parsed = parseHistoryUserMessage(msg.content);
        if (parsed) addMessage(parsed.type, parsed.text, parsed.meta, null, parsed.timestamp, parsed.iface);
      } else if (msg.role === 'assistant') {
        if (Array.isArray(msg.content)) {
          for (const part of msg.content) {
            if (part.type === 'text' && part.text) {
              addMessage('assistant', part.text);
            } else if (part.type === 'tool-call') {
              const input = part.input || {};
              const detail = input.path || input.command || input.pattern || input.url || input.action || '';
              const el = addMessage('tool', `${part.toolName} ${detail}`, null, input);
              // Attach result if available (for non-edit tools, or append to edit diff)
              const result = toolResults[part.toolCallId];
              if (result && el) {
                const outputEl = el.querySelector('.tool-output');
                if (outputEl) {
                  const truncated = result.length > 5000
                    ? result.slice(0, 5000) + '\n... (truncated)'
                    : result;
                  if (outputEl.innerHTML) {
                    // Already has content (edit diff, write content, etc) — append result
                    outputEl.innerHTML += '\n\n' + escapeHtml(truncated);
                  } else {
                    outputEl.textContent = truncated;
                  }
                }
              }
            }
          }
        } else if (typeof msg.content === 'string') {
          addMessage('assistant', msg.content);
        }
      }
    }
  } catch {}
  isLoadingHistory = false;
  scrollToBottom(true);

  // If agent is mid-turn, show thinking indicator
  try {
    const status = await AgentClient.getStatus(BASE_URL, AUTH_TOKEN);
    if (status.queue && status.queue.startsWith('busy')) {
      setBusy(true);
      showThinking();
    }
  } catch {}

  // Connect SSE
  connection = AgentClient.connect(BASE_URL, AUTH_TOKEN, {
    onEvent: handleEvent,
    onConnect() {
      setConnected('connected');
    },
    async onDisconnect() {
      if (authFailed || intentionalClose) return;
      setConnected('disconnected');
      addMessage('system', 'disconnected — reconnecting...');
      // Re-discover agents (proxy URL is stable, but agent may have stopped)
      await discoverAllAgents();
      reconnectTimer = setTimeout(init, 2000);
    },
  });
}

setupSwitcher();

// --- Filters ---
const FILTERS = [
  { key: 'heartbeat', label: 'Heartbeats', default: false },
  { key: 'tui', label: 'TUI messages', default: true },
  { key: 'tools', label: 'Tool calls', default: true },
  { key: 'incoming', label: 'Telegram / Slack', default: true },
  { key: 'system', label: 'System messages', default: true },
];

function getFilters() {
  try {
    const saved = JSON.parse(localStorage.getItem('kern_filters') || '{}');
    const result = {};
    for (const f of FILTERS) result[f.key] = f.key in saved ? saved[f.key] : f.default;
    return result;
  } catch { return Object.fromEntries(FILTERS.map(f => [f.key, f.default])); }
}

function saveFilters(filters) {
  localStorage.setItem('kern_filters', JSON.stringify(filters));
}

function applyFilters() {
  const filters = getFilters();
  const el = messagesEl;
  el.classList.toggle('hide-heartbeat', !filters.heartbeat);
  el.classList.toggle('hide-tui', !filters.tui);
  el.classList.toggle('hide-tools', !filters.tools);
  el.classList.toggle('hide-incoming', !filters.incoming);
  el.classList.toggle('hide-system', !filters.system);
}

function renderFilterDropdown() {
  const filters = getFilters();
  const dd = $('filter-dropdown');
  dd.innerHTML = FILTERS.map(f => {
    const active = filters[f.key];
    return `<div class="filter-item ${active ? 'active' : ''}" data-key="${f.key}">
      <span class="check">${active ? '✓' : ''}</span>
      ${f.label}
    </div>`;
  }).join('');
}

$('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('kern_web_token');
  location.reload();
});

$('filter-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  const dd = $('filter-dropdown');
  const isOpen = dd.classList.contains('open');
  dd.classList.toggle('open', !isOpen);
  if (!isOpen) renderFilterDropdown();
});

$('filter-dropdown').addEventListener('click', (e) => {
  const item = e.target.closest('.filter-item');
  if (!item) return;
  e.stopPropagation();
  const key = item.dataset.key;
  const filters = getFilters();
  filters[key] = !filters[key];
  saveFilters(filters);
  applyFilters();
  renderFilterDropdown();
});

document.addEventListener('click', () => {
  $('filter-dropdown').classList.remove('open');
});

applyFilters();

// Show token prompt using modal — resolves when user submits valid token
function showTokenPrompt() {
  return new Promise(resolve => {
    const modal = $('auth-modal');
    const input = $('auth-token');
    const btn = $('auth-submit');
    input.value = '';
    modal.classList.add('open');
    input.focus();
    function submit() {
      const val = input.value.trim();
      if (!val) return;
      setLocalToken(val);
      modal.classList.remove('open');
      resolve(val);
    }
    btn.onclick = submit;
    input.onkeydown = (e) => { if (e.key === 'Enter') submit(); };
  });
}

// On load: check URL for token param, save and clean URL
(function checkUrlToken() {
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  if (token) {
    setLocalToken(token);
    history.replaceState(null, '', location.pathname);
  }
})();

// On load: discover agents, auto-connect or show switcher
(async () => {
  let localStatus = await discoverAllAgents();

  // If local server needs auth, prompt for token
  while (localStatus === 'unauthorized') {
    await showTokenPrompt();
    localStatus = await discoverAllAgents();
  }

  renderSwitcher();

  const agents = getAllAgents();
  const activeName = getActiveAgent();
  const activeAgent = agents.find(a => a.name === activeName && a.running && a.url);
  const runningAgents = agents.filter(a => a.running && a.url);

  if (activeAgent) {
    // Resume previous agent
    BASE_URL = activeAgent.url;
    AUTH_TOKEN = getServerToken(activeAgent.server || location.origin);
    init();
  } else if (runningAgents.length === 1) {
    // Only one running agent — auto-connect
    switchToAgent(runningAgents[0]);
  } else if (runningAgents.length > 1) {
    // Multiple running agents — show switcher
    setConnected('disconnected');
    agentNameEl.textContent = 'kern';
    renderSwitcher();
    openSidebar();
  } else {
    // No running agents
    setConnected('disconnected');
    agentNameEl.textContent = 'kern';
    addMessage('system', 'No running agents found. Start an agent with `kern start` or add a server.');
  }
})();

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
