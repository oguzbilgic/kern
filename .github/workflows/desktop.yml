name: 'Desktop Build'

on:
  workflow_dispatch:
  push:
    branches:
      - feat/desktop
      - master
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin --bundles app'
            target: 'aarch64-apple-darwin'
            name: 'macos-arm64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin --bundles app'
            target: 'x86_64-apple-darwin'
            name: 'macos-x64'
          - platform: 'ubuntu-22.04'
            args: ''
            target: ''
            name: 'linux-x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build
        working-directory: desktop
        run: cargo tauri build ${{ matrix.args }}

      - name: List build output
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            find desktop/src-tauri/target/${{ matrix.target }}/release -maxdepth 3 -name "*.app" -o -name "kern-desktop" 2>/dev/null || true
          else
            find desktop/src-tauri/target/release -maxdepth 3 -name "*.deb" -o -name "*.AppImage" -o -name "kern-desktop" 2>/dev/null || true
          fi

      - name: Package macOS app
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p desktop/dist
          APP_PATH=$(find desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "desktop/dist/kern-${{ matrix.name }}.zip"

      - name: Upload macOS app
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kern-${{ matrix.name }}
          path: desktop/dist/kern-${{ matrix.name }}.zip
          if-no-files-found: error

      - name: Upload Linux binary
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: kern-${{ matrix.name }}
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/kern-desktop
          if-no-files-found: warn
