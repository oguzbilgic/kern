name: 'Desktop Build'

on:
  workflow_dispatch:
  push:
    branches:
      - feat/desktop
      - master
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin --bundles app'
            target: 'aarch64-apple-darwin'
            name: 'macos-arm64'
            branchOnly: true
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin --bundles app'
            target: 'x86_64-apple-darwin'
            name: 'macos-x64'
            branchOnly: false
          - platform: 'ubuntu-22.04'
            args: ''
            target: ''
            name: 'linux-x64'
            branchOnly: false
          - platform: 'windows-latest'
            args: ''
            target: ''
            name: 'windows-x64'
            branchOnly: false

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip non-branch matrix jobs on push
        if: github.event_name == 'push' && matrix.branchOnly != true
        run: |
          echo "Skipping ${{ matrix.name }} on branch push"
          exit 0

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch' || matrix.branchOnly == true
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Rust cache
        if: github.event_name == 'workflow_dispatch' || matrix.branchOnly == true
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri -> target

      - name: Install Rust stable
        if: github.event_name == 'workflow_dispatch' || matrix.branchOnly == true
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: (github.event_name == 'workflow_dispatch' || matrix.branchOnly == true) && matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install desktop npm dependencies
        if: github.event_name == 'workflow_dispatch' || matrix.branchOnly == true
        working-directory: desktop
        run: npm ci

      - name: Build
        if: github.event_name == 'workflow_dispatch' || matrix.branchOnly == true
        working-directory: desktop
        run: npx tauri build ${{ matrix.args }}

      - name: List build output
        if: (github.event_name == 'workflow_dispatch' || matrix.branchOnly == true) && matrix.platform != 'windows-latest'
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            find desktop/src-tauri/target/${{ matrix.target }}/release -maxdepth 3 -name "*.app" -o -name "kern-desktop" 2>/dev/null || true
          else
            find desktop/src-tauri/target/release -maxdepth 3 -name "*.deb" -o -name "*.AppImage" -o -name "kern-desktop" 2>/dev/null || true
          fi

      - name: List build output (Windows)
        if: (github.event_name == 'workflow_dispatch' || matrix.branchOnly == true) && matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem -Path desktop/src-tauri/target/release/bundle -Recurse -Include *.msi,*.exe | Select-Object FullName

      - name: Package macOS app
        if: (github.event_name == 'workflow_dispatch' || matrix.branchOnly == true) && matrix.platform == 'macos-latest'
        run: |
          mkdir -p desktop/dist
          APP_PATH=$(find desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "desktop/dist/kern-${{ matrix.name }}.zip"

      - name: Upload macOS app
        if: (github.event_name == 'workflow_dispatch' || matrix.branchOnly == true) && matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kern-${{ matrix.name }}
          path: desktop/dist/kern-${{ matrix.name }}.zip
          if-no-files-found: error

      - name: Upload Linux binary
        if: (github.event_name == 'workflow_dispatch' || matrix.branchOnly == true) && matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: kern-${{ matrix.name }}
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/kern-desktop
          if-no-files-found: warn

      - name: Upload Windows installer
        if: (github.event_name == 'workflow_dispatch' || matrix.branchOnly == true) && matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kern-${{ matrix.name }}
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
