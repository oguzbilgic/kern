name: Docker

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tags=ghcr.io/oguzbilgic/kern-ai:${{ github.event.release.tag_name }},ghcr.io/oguzbilgic/kern-ai:latest" >> $GITHUB_OUTPUT
          else
            echo "tags=ghcr.io/oguzbilgic/kern-ai:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.tags.outputs.tags }}
